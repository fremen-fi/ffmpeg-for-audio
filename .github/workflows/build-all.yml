name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v4
      - run: echo "7" | bash macOS/install_macos_static.sh
      - run: cp /usr/local/ffmpeg-static/bin/ffmpeg ./ffmpeg-${{ matrix.os }}
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}
          path: ffmpeg-${{ matrix.os }}

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - run: echo "7" | bash Linux/install_static_bare.sh
      - run: cp /usr/local/ffmpeg-static-bare/bin/ffmpeg ./ffmpeg-${{ matrix.os }}
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}
          path: ffmpeg-${{ matrix.os }}

  build-linux-image:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lower-case repo slug
        id: repo
        run: echo "lc=${REPO,,}" >> $GITHUB_OUTPUT
        env:
          REPO: ${{ github.repository }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: Linux
          file: Linux/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: FFMPEG_MAJOR=7
          tags: |
            ghcr.io/${{ steps.repo.outputs.lc }}/linux-bare-7.1:${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
            ghcr.io/${{ steps.repo.outputs.lc }}/linux-bare-7.1:latest

  build-windows:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute build image cache tag
      id: imgkey
      run: |
        REPO="${{ github.repository }}"
        REPO="${REPO,,}"
        KEY=$(
          {
            find Windows/scripts.d Windows/variants Windows/addins Windows/util Windows/images Windows/patches -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum
            sha256sum Windows/generate.sh Windows/makeimage.sh Windows/download.sh
          } | sha256sum | cut -c1-16
        )
        echo "image=ghcr.io/${REPO}/win64-nonfree-7.1:${KEY}" >> $GITHUB_OUTPUT

    - name: Try to restore build image from GHCR
      id: imgcache
      run: |
        REPO="${{ github.repository }}"
        REPO="${REPO,,}"
        if docker pull "${{ steps.imgkey.outputs.image }}" 2>/dev/null; then
          docker tag "${{ steps.imgkey.outputs.image }}" "ghcr.io/${REPO}/win64-nonfree-7.1:latest"
          echo "hit=true" >> $GITHUB_OUTPUT
        else
          echo "hit=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Windows Docker image
      if: steps.imgcache.outputs.hit != 'true'
      env:
        BASE_FALLBACK_REPO: mikasappi/ffmpeg-for-audio
      run: |
        REPO="${{ github.repository }}"
        REPO="${REPO,,}"
        if docker pull "ghcr.io/${REPO}/base-win64:latest" 2>/dev/null; then
          export QUICKBUILD=1
        elif [[ -n "$BASE_FALLBACK_REPO" ]] && docker pull "ghcr.io/${BASE_FALLBACK_REPO}/base-win64:latest" 2>/dev/null; then
          docker tag "ghcr.io/${BASE_FALLBACK_REPO}/base-win64:latest" "ghcr.io/${REPO}/base-win64:latest"
          docker push "ghcr.io/${REPO}/base-win64:latest"
          if docker pull "ghcr.io/${BASE_FALLBACK_REPO}/base:latest" 2>/dev/null; then
            docker tag "ghcr.io/${BASE_FALLBACK_REPO}/base:latest" "ghcr.io/${REPO}/base:latest"
            docker push "ghcr.io/${REPO}/base:latest"
          fi
          export QUICKBUILD=1
        fi
        NOCLEAN=1 bash Windows/makeimage.sh win64 nonfree 7.1

    - name: Push build image to GHCR
      if: steps.imgcache.outputs.hit != 'true'
      run: |
        REPO="${{ github.repository }}"
        REPO="${REPO,,}"
        docker tag "ghcr.io/${REPO}/win64-nonfree-7.1:latest" "${{ steps.imgkey.outputs.image }}"
        docker push "${{ steps.imgkey.outputs.image }}"
        docker push "ghcr.io/${REPO}/base:latest" 2>/dev/null || true
        docker push "ghcr.io/${REPO}/base-win64:latest" 2>/dev/null || true

    - run: bash Windows/build.sh win64 nonfree 7.1
    - run: |
        mkdir extracted_zip
        unzip -j Windows/artifacts/*.zip -d extracted_zip
        find extracted_zip -type f -name "ffmpeg.exe" -exec mv {} . \;
    - uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-windows
        path: ffmpeg.exe

  release:
    needs: [build-macos, build-linux, build-linux-image, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          files: release-artifacts/**/*
